<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ news.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>{{ news.title }}</header>
    <div style="padding: 20px; max-width: 800px; margin: auto;">
        <img src="{{ url_for('static', filename='images/' + news.image) }}" alt="{{ news.title }}" style="max-width: 100%; border-radius: 10px;">
        <p style="margin-top: 20px; font-size: 18px;">{{ news.description }}</p>
        <a href="{{ url_for('home') }}" style="display: inline-block; margin-top: 20px; color: #007BFF;">← Back to Home</a>
    </div>
</body>
</html>
