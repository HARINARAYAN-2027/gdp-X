<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ news.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: #f9f9f9;
        color: #333;
    }

    header {
        background: linear-gradient(to right, #141e30, #243b55);
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: 600;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    nav {
        background-color: #1c2b36;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        padding: 10px 0;
    }

    nav ul li {
        margin: 0 15px;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        padding: 8px 12px;
    }

    nav ul li a:hover {
        background-color: #2a3e52;
        border-radius: 5px;
    }

    .content {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        text-align: center;
    }

    .content img {
        width: 70%;
        max-height: 350px;
        object-fit: contain;
        border-radius: 10px;
        margin-bottom: 25px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .content p {
        font-size: 18px;
        line-height: 1.6;
        text-align: justify;
    }

    .back-link {
        display: inline-block;
        margin-top: 25px;
        color: #007BFF;
        text-decoration: none;
        font-weight: 500;
    }

    .back-link:hover {
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        .content img {
            width: 90%;
            max-height: 250px;
        }

        .content {
            padding: 15px;
        }
    }
</style>

</head>
<body>
    <header>{{ news.title }}</header>

    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('about') }}">About</a></li>
            <li><a href="{{ url_for('contact') }}">Contact</a></li>
            <li><a href="{{ url_for('results') }}">Results</a></li>
            <li><a href="{{ url_for('privacy') }}">Privacy</a></li>
            <li><a href="{{ url_for('terms') }}">Terms</a></li>
        </ul>
    </nav>

    <div class="content">
        <img src="{{ url_for('static', filename='images/' + news.image) }}" alt="{{ news.title }}">
        <p>{{ news.description }}</p>
        <a href="{{ url_for('home') }}" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
