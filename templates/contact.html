<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-5467190410358033">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GDP Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y2DS4JJDM0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-Y2DS4JJDM0');
    </script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5467190410358033"
        crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0d1a26;
            color: #fff;
            text-align: center;
            padding: 25px 10px;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            background-color: #1c2b36;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav ul li {
            margin: 0;
        }

        nav ul li a {
            display: block;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        nav ul li a:hover {
            background-color: #2e4a5f;
        }

        .contact-container {
            max-width: 650px;
            background: #fff;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1, p {
            margin-bottom: 20px;
        }

        form label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }

        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        form button {
            background-color: #007bff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 16px;
        }

        form button:hover {
            background-color: #0056b3;
        }

        .message-box {
            padding: 12px;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        footer {
            background-color: #0d1a26;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }

        footer .social-media img {
            width: 24px;
            margin: 0 10px;
            vertical-align: middle;
        }

        @media (max-width: 600px) {
            .contact-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- AdSense Banner -->
    <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-5467190410358033"
        data-ad-slot="8350573784"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <header>
        <h1>Contact Us</h1>
        <p>We'd love to hear from you!</p>
    </header>

    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/results">Results</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <p><strong>Phone:</strong> 7759895298</p>
        <p><strong>Email:</strong> harinarayankumar548@gmail.com</p>

        <!-- Flash messages -->
        {% if success_message %}
            <div class="message-box success">{{ success_message }}</div>
        {% elif error_message %}
            <div class="message-box error">{{ error_message }}</div>
        {% endif %}

        <form action="/submit_contact" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2025 GDP Predictor. All rights reserved.</p>
        <div class="social-media">
            <a href="https://facebook.com" target="_blank">
                <img src="{{ url_for('static', filename='images/facebook-icon.png') }}" alt="Facebook">
            </a>
            <a href="https://twitter.com" target="_blank">
                <img src="{{ url_for('static', filename='images/twitter-icon.png') }}" alt="Twitter">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="{{ url_for('static', filename='images/instagram-icon.png') }}" alt="Instagram">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="{{ url_for('static', filename='images/linkedin-icon.png') }}" alt="LinkedIn">
            </a>
        </div>
    </footer>

    <!-- Optional: Auto-hide messages -->
    <script>
        setTimeout(() => {
            const box = document.querySelector('.message-box');
            if (box) box.style.display = 'none';
        }, 5000);
    </script>
</body>
</html>
