<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDP Prediction Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
       .result-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        form label {
            font-size: 18px;
            color: #333;
        }
           
        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 15px;
        }
            img {
            border: 2px solid #ccc;
            margin-top: 20px;
            max-width: 90%; /* Responsive */
            height: auto;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: rgb(122, 54, 54);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .back-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
     <!-- Header -->
     <header>
        <div class="logo">
            <h1>GDP Predictor</h1>
        </div>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/results">Results</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1>GDP Prediction Results</h1>
        <!-- Predicted GDP Value -->
        <p><strong>{{ prediction_text }}</strong></p>
        <!-- Plot Display -->
        <img src="{{ plot_path }}" alt="GDP Prediction Plot">
        <!-- Back to Home Button -->
        <a href="/" class="back-button">Back to Home</a>
    </div>
</body>
</html>
