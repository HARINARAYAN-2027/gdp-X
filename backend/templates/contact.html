<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-5467190410358033">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y2DS4JJDM0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Y2DS4JJDM0');
    </script>

    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5467190410358033" crossorigin="anonymous"></script>

    <!-- CMP -->
    <script async src="https://fundingchoicesmessages.google.com/i/pub-5467190410358033?ers=1" nonce="cmp"></script>
    <script nonce="cmp">
        (function() {
          window.__cmp = window.__cmp || function() {
            (window.__cmp.q = window.__cmp.q || []).push(arguments)
          };
        })();
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e3e3e3;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            color: white;
            padding: 10px 20px;
        }
        header .logo h1 {
            margin: 0;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
            padding: 0;
            margin: 0;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
        }

        .contact-container {
            max-width: 600px;
            margin: 40px auto;
            background: #f4f4f4;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        form label {
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            display: block;
            color: #444;
        }
        form input, form textarea {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        form button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
        form button:hover {
            background-color: #218838;
        }
        .message-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 12px 0;
            margin-top: 50px;
        }
        footer .social-media img {
            width: 20px;
            margin: 0 8px;
        }
    </style>
</head>
<body>

    <!-- AdSense Banner -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-5467190410358033"
         data-ad-slot="8350573784"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <!-- Header -->
    <header>
        <div class="logo">
            <h1>GDP Predictor</h1>
        </div>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/results">Results</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Form -->
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p><strong>Phone:</strong> 7759895298</p>
        <p><strong>Email:</strong> harinarayankumar548@gmail.com</p>

        {% if success_message %}
            <div class="message-box success">{{ success_message }}</div>
        {% elif error_message %}
            <div class="message-box error">{{ error_message }}</div>
        {% endif %}

        <form action="/submit_contact" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>
        </form>

        <!-- Another Ad Block (optional) -->
        <div style="margin-top: 20px;">
            <ins class="adsbygoogle"
                style="display:block"
                data-ad-client="ca-pub-5467190410358033"
                data-ad-slot="8350573784"
                data-ad-format="auto"
                data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 GDP Predictor. All rights reserved.</p>
        <div class="social-media">
            <a href="https://facebook.com" target="_blank">
                <img src="{{ url_for('static', filename='images/facebook-icon.png') }}" alt="Facebook">
            </a>
            <a href="https://twitter.com" target="_blank">
                <img src="{{ url_for('static', filename='images/twitter-icon.png') }}" alt="Twitter">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="{{ url_for('static', filename='images/instagram-icon.png') }}" alt="Instagram">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="{{ url_for('static', filename='images/linkedin-icon.png') }}" alt="LinkedIn">
            </a>
        </div>
    </footer>

</body>
</html>
